<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f8ecb">
  <link rel="manifest" href="manifest.json?v=3.2.0">
  <link rel="stylesheet" href="style.css?v=3.2.0">
  <title>くぼちゃんパン管理システム</title>
</head>
<body>
<div id="lock" class="lock hidden">
  <div class="lock-card">
    <h1>くぼちゃんパン管理システム</h1>
    <p>パスワードを入力してください</p>
    <input id="unlockPass" type="password" placeholder="パスワード">
    <button class="primary" onclick="App.unlock()">開く</button>
  </div>
</div>
<header class="app-header">
  <div><h1>くぼちゃんパン管理</h1><small id="versionText">Ver.3.2.0</small></div>
  <button class="ghost" onclick="Settings.forceUpdate()">最新版取得</button>
</header>
<div id="updateBanner" class="update hidden">新しい更新があります <button onclick="Settings.forceUpdate()">更新する</button></div>
<main>
  <section id="home" class="screen active">
    <div class="dashboard" id="homeDashboard"></div>
    <div class="panel compact"><h2>今日の製造リスト</h2><div id="homeProduction"></div></div>
  </section>
  <section id="reserve" class="screen">
    <div class="panel"><h2>予約登録</h2><div class="form-grid"><input id="rDate" type="date"><input id="rTime" type="time"><input id="rName" placeholder="お客様名"></div><div id="itemRows"></div><button onclick="Reservation.addItemRow()">商品を追加</button><button class="primary" onclick="Reservation.save()">予約保存</button></div>
    <div class="panel"><h2>予約一覧</h2><div class="form-grid"><input id="filterDate" type="date" oninput="Reservation.render()"><input id="searchName" placeholder="名前検索" oninput="Reservation.render()"></div><div id="reservationList"></div></div>
  </section>
  <section id="production" class="screen"><div class="panel"><h2>製造リスト</h2><input id="prodDate" type="date" oninput="Production.render()"><div id="productionList"></div><button onclick="Production.print()">印刷</button><button onclick="Production.line()">LINEで送る</button></div></section>
  <section id="sales" class="screen"><div class="panel"><h2>販売売上</h2><div class="form-grid"><input id="sDate" type="date"><input id="storeSales" type="number" placeholder="店頭販売売上"><select id="weather"><option>晴れ</option><option>くもり</option><option>雨</option><option>雪</option><option>その他</option></select></div><textarea id="salesMemo" placeholder="メモ"></textarea><button class="primary" onclick="Sales.save()">保存</button><div id="salesSummary"></div></div></section>
  <section id="analytics" class="screen"><div class="panel"><h2>分析</h2><div id="analyticsBody"></div><button onclick="Analytics.print()">印刷</button></div></section>
  <section id="settings" class="screen"><div class="panel"><h2>設定</h2><div id="settingsBody"></div></div></section>
</main>
<nav class="bottom-nav">
  <button onclick="App.show('home')">ホーム</button><button onclick="App.show('reserve')">予約</button><button onclick="App.show('production')">製造</button><button onclick="App.show('sales')">売上</button><button onclick="App.show('analytics')">分析</button><button onclick="App.show('settings')">設定</button>
</nav>
<script src="storage.js?v=3.2.0"></script><script src="reservation.js?v=3.2.0"></script><script src="sales.js?v=3.2.0"></script><script src="production.js?v=3.2.0"></script><script src="analytics.js?v=3.2.0"></script><script src="backup.js?v=3.2.0"></script><script src="settings.js?v=3.2.0"></script><script src="app.js?v=3.2.0"></script>
</body>
</html>
