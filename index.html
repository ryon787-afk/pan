<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#b96b35" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>くぼちゃんパン 管理システム Ver.2.0</title>
<style>
:root{--bg:#fff8ef;--card:#fff;--text:#34251d;--muted:#77675d;--main:#b96b35;--main2:#f1d2ae;--line:#ead8c2;--danger:#c95050;--ok:#4f8f5f;--blue:#4b75a8;--warn:#c58b25}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,#d69050,#9e5424);color:white;padding:16px 14px 12px;border-bottom-left-radius:18px;border-bottom-right-radius:18px;box-shadow:0 4px 14px rgba(100,60,20,.18)}h1{font-size:19px;margin:0 0 4px}.today{font-size:12px;opacity:.92}.wrap{padding:12px;max-width:1040px;margin:0 auto}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:12px 0}.tabs button{font-size:12px;padding:10px 5px}button{border:0;border-radius:13px;padding:11px 10px;background:var(--main2);color:var(--text);font-weight:800;font-size:14px}button.active,button.primary{background:var(--main);color:white}.danger{background:#f2c5c5;color:#742020}.ok{background:#d8eddc;color:#24522c}.blue{background:#d7e5f4;color:#254768}.warn{background:#fae6bd;color:#6b4610}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:12px 0;box-shadow:0 2px 10px rgba(80,50,30,.06)}h2{font-size:17px;margin:0 0 12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.field{margin:9px 0}label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px;background:#fffdf9;font-size:16px;color:var(--text)}textarea{min-height:70px;resize:vertical}.stat{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat div{background:#fff4e7;border-radius:16px;padding:12px}.stat b{display:block;font-size:20px;margin-top:4px}.list-item{border-top:1px solid var(--line);padding:11px 0}.list-item:first-child{border-top:0}.mini{font-size:12px;color:var(--muted);line-height:1.6}.price{font-weight:900}.pill{display:inline-block;border-radius:999px;background:#f6e5d1;padding:4px 8px;font-size:12px;margin:2px}.hidden{display:none}.empty{color:var(--muted);text-align:center;padding:16px}.smallbtn{padding:8px 9px;font-size:12px;border-radius:10px;margin:3px}.item-row{border:1px solid var(--line);background:#fffaf2;border-radius:14px;padding:10px;margin:8px 0}.product-buttons{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.product-buttons button{text-align:left;background:#fff4e7;border:1px solid var(--line)}.print-area{display:none}.table{width:100%;border-collapse:collapse;background:white}.table th,.table td{border:1px solid #ddd;padding:7px;text-align:left;font-size:13px}.bar{height:12px;background:#e8c49c;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:#b96b35}.notice{background:#fff3cd;border:1px solid #f0d889;padding:10px;border-radius:14px;font-size:13px;line-height:1.7}.footer{height:30px}@media(min-width:720px){.tabs{grid-template-columns:repeat(10,1fr)}.product-buttons{grid-template-columns:repeat(3,1fr)}.stat{grid-template-columns:repeat(4,1fr)}}@media print{body{background:white;color:#111}.no-print,header,.tabs,.card:not(.printing){display:none!important}.print-area{display:block!important}.printing{display:block!important;box-shadow:none;border:0}.wrap{max-width:none;padding:0}button,input,select,textarea{display:none}.table th,.table td{font-size:12px}h1,h2{color:#111}}


/* ===== Ver.2.0 レスポンシブ強化 ===== */
html{-webkit-text-size-adjust:100%;font-size:clamp(15px,2.7vw,17px)}
body{min-width:0;overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom)}
.wrap{width:min(100%,1100px);padding:clamp(10px,3vw,18px)}
header{padding-top:calc(14px + env(safe-area-inset-top));}
h1{font-size:clamp(18px,5vw,24px)}
h2{font-size:clamp(16px,4.2vw,20px)}
.tabs{grid-template-columns:repeat(auto-fit,minmax(86px,1fr));position:sticky;top:calc(62px + env(safe-area-inset-top));z-index:9;background:var(--bg);padding:8px 0;margin:8px 0 12px;}
.tabs button{min-height:44px;white-space:normal;line-height:1.25;}
button,input,select,textarea{min-height:44px;touch-action:manipulation}
button{cursor:pointer}
.grid,.grid3{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));align-items:end}
.stat{grid-template-columns:repeat(auto-fit,minmax(145px,1fr))}
.product-buttons{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.item-row{display:grid;grid-template-columns:1.4fr .75fr .9fr auto;gap:8px;align-items:end}
.item-row .field{margin:0;min-width:0}
.item-row button{align-self:end;min-width:72px}
.list-item{overflow-wrap:anywhere}.list-item select{max-width:180px;display:inline-block;margin:6px 0}
.card{overflow:hidden}.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}.table{min-width:560px}
@media(max-width:640px){
  .wrap{padding:10px}.card{border-radius:16px;padding:12px;margin:10px 0}
  .tabs{grid-template-columns:repeat(3,1fr);top:calc(58px + env(safe-area-inset-top));gap:6px}
  .tabs button{font-size:12px;padding:9px 4px;border-radius:12px}
  .grid,.grid3{grid-template-columns:1fr;gap:6px}
  .stat{grid-template-columns:1fr 1fr;gap:8px}.stat div{padding:10px}.stat b{font-size:18px}
  .item-row{grid-template-columns:1fr;gap:8px;padding:12px}
  .item-row button{width:100%}
  .smallbtn{display:inline-flex;align-items:center;justify-content:center;min-height:38px;margin:4px 2px}
  input,select,textarea{font-size:16px;padding:12px}
}
@media(max-width:390px){
  .tabs{grid-template-columns:repeat(2,1fr)}
  .stat{grid-template-columns:1fr}
  h1{font-size:18px}.today{font-size:11px}
}
@media(min-width:900px){
  .tabs{grid-template-columns:repeat(10,1fr)}
  .card{padding:18px}.grid{grid-template-columns:repeat(2,1fr)}.grid3{grid-template-columns:repeat(3,1fr)}
}
@media(prefers-color-scheme:dark){
  :root{--bg:#211813;--card:#2b211b;--text:#fff5ec;--muted:#d2b8a5;--line:#604839;--main2:#5a3d28}
  input,select,textarea{background:#38291f;color:var(--text);border-color:var(--line)}
  .stat div,.product-buttons button,.totalBox,.item-row{background:#33251d}
  .notice{background:#3c321f;border-color:#705d2f;color:var(--text)}
}
@media print{html{font-size:12px}.tabs{display:none!important}.table{min-width:0;width:100%}.table-wrap{overflow:visible}}

</style>
</head>
<body>
<header><h1>くぼちゃんパン 管理システム</h1><div class="today" id="todayText"></div></header>
<main class="wrap">
<nav class="tabs no-print">
<button class="active" onclick="showTab('home',this)">ホーム</button><button onclick="showTab('reserve',this)">予約</button><button onclick="showTab('production',this)">製造</button><button onclick="showTab('sales',this)">売上</button><button onclick="showTab('products',this)">商品</button><button onclick="showTab('stats',this)">商品分析</button><button onclick="showTab('repeaters',this)">リピーター</button><button onclick="showTab('analysis',this)">経営分析</button><button onclick="showTab('print',this)">印刷/LINE</button><button onclick="showTab('data',this)">データ</button>
</nav>
<section id="home" class="tab"><div class="card"><h2>今日のまとめ</h2><div class="stat"><div>予約件数<b id="homeReserveCount">0件</b></div><div>予約金額<b id="homeReserveAmount">¥0</b></div><div>店頭販売<b id="homeStoreSales">¥0</b></div><div>合計売上<b id="homeTotalSales">¥0</b></div><div>製造商品数<b id="homeMakeCount">0個</b></div><div>未受取<b id="homeUnreceived">0件</b></div><div>受取済み<b id="homeReceived">0件</b></div><div>キャンセル<b id="homeCanceled">0件</b></div></div></div><div class="card"><h2>去年の今日は？</h2><div id="lastYearToday"></div></div><div class="card"><h2>今日の予約</h2><div id="todayReservations"></div></div></section>
<section id="reserve" class="tab hidden"><div class="card"><h2 id="reserveFormTitle">予約を追加</h2><input type="hidden" id="editId"><div class="grid"><div class="field"><label>日付</label><input id="rDate" type="date"></div><div class="field"><label>受取時間</label><input id="rTime" type="time"></div></div><div class="field"><label>お客様名</label><input id="rName" placeholder="例：山田様"></div><div id="reserveItems"></div><button class="blue" onclick="addReserveItem()">＋ 商品を追加</button><div class="grid"><div class="field"><label>状態</label><select id="rStatus"><option>未受取</option><option>受取済み</option><option>キャンセル</option></select></div><div class="field"><label>予約合計</label><input id="rTotal" type="number" readonly></div></div><div class="field"><label>備考</label><textarea id="rNote" placeholder="例：6枚切り、袋分け"></textarea></div><button class="primary" onclick="saveReservation()">予約を保存</button><button class="warn hidden" id="cancelEditBtn" onclick="clearReserveForm()">編集をキャンセル</button></div><div class="card"><h2>予約一覧</h2><div class="grid"><div class="field"><label>日付</label><input id="filterDate" type="date" oninput="render()"></div><div class="field"><label>名前・商品検索</label><input id="filterText" placeholder="検索" oninput="render()"></div></div><div id="reservationList"></div></div></section>
<section id="production" class="tab hidden"><div class="card"><h2>製造リスト</h2><div class="field"><label>日付</label><input id="makeDate" type="date" oninput="renderProduction()"></div><div id="productionList"></div><button class="primary" onclick="printReport('production')">製造リストを印刷</button><button class="blue" onclick="shareLine(buildProductionText(makeDate.value))">LINEで送る</button></div></section>
<section id="sales" class="tab hidden"><div class="card"><h2>店頭販売売上</h2><div class="grid"><div class="field"><label>日付</label><input id="sDate" type="date" oninput="loadSaleForm()"></div><div class="field"><label>店頭販売売上</label><input id="sStore" type="number" min="0" placeholder="例：50000"></div></div><div class="grid"><div class="field"><label>天気</label><select id="sWeather"><option>未入力</option><option>晴れ</option><option>くもり</option><option>雨</option><option>雪</option><option>強風</option><option>猛暑</option><option>寒い</option></select></div><div class="field"><label>来店人数</label><input id="sCustomers" type="number" min="0" placeholder="例：80"></div></div><div class="field"><label>メモ</label><textarea id="sMemo" placeholder="例：イベント、完売、売れ残りなど"></textarea></div><button class="primary" onclick="saveSale()">売上を保存</button><div class="notice" id="salesSummary"></div></div></section>
<section id="products" class="tab hidden"><div class="card"><h2>商品管理</h2><input type="hidden" id="pEditId"><div class="grid"><div class="field"><label>商品名</label><input id="pName"></div><div class="field"><label>価格</label><input id="pPrice" type="number"></div></div><div class="grid"><div class="field"><label>カテゴリー</label><select id="pCategory"><option>食パン</option><option>ベーグル</option><option>菓子パン</option><option>惣菜パン</option><option>ハード系</option><option>チーズケーキ</option><option>その他</option></select></div><div class="field"><label>メモ</label><input id="pNote"></div></div><button class="primary" onclick="saveProduct()">商品を保存</button><button class="warn hidden" id="pCancel" onclick="clearProductForm()">編集をキャンセル</button></div><div class="card"><h2>商品一覧</h2><div id="productList"></div></div></section>
<section id="stats" class="tab hidden"><div class="card"><h2>商品分析</h2><div class="grid"><div class="field"><label>対象年月</label><input id="statsMonth" type="month" oninput="renderStats()"></div><div class="field"><label>対象年</label><input id="statsYear" type="number" oninput="renderStats()"></div></div><div id="productStats"></div><button class="primary" onclick="printReport('stats')">商品分析を印刷</button></div></section>
<section id="repeaters" class="tab hidden"><div class="card"><h2>リピーター履歴</h2><div id="repeaterList"></div><button class="primary" onclick="printReport('repeaters')">リピーター一覧を印刷</button></div></section>
<section id="analysis" class="tab hidden"><div class="card"><h2>経営分析</h2><div class="field"><label>対象年</label><input id="analysisYear" type="number" oninput="renderAnalysis()"></div><h2>曜日別売上</h2><div id="weekdayAnalysis"></div><h2>月別推移</h2><div id="monthlyAnalysis"></div><h2>年間比較</h2><div id="yearlyAnalysis"></div><button class="primary" onclick="printReport('analysis')">経営分析を印刷</button></div></section>
<section id="print" class="tab hidden"><div class="card"><h2>印刷・LINE共有</h2><div class="field"><label>対象日</label><input id="printDate" type="date"></div><div class="grid"><button class="primary" onclick="printReport('today')">今日の予約印刷</button><button class="primary" onclick="printReport('production')">製造リスト印刷</button><button class="primary" onclick="printReport('month')">月間売上印刷</button><button class="primary" onclick="printReport('year')">年間売上印刷</button></div><hr><div class="grid"><button class="blue" onclick="shareLine(buildTodayText(printDate.value))">予約をLINE</button><button class="blue" onclick="shareLine(buildProductionText(printDate.value))">製造をLINE</button><button class="blue" onclick="shareLine(buildDailySalesText(printDate.value))">売上をLINE</button><button class="blue" onclick="copyText(buildTodayText(printDate.value))">文章コピー</button></div></div></section>
<section id="data" class="tab hidden"><div class="card"><h2>データ管理</h2><div class="notice">予約データやお客様名はこの端末内に保存されます。バックアップJSONはGitHubにアップロードしないでください。</div><button class="primary" onclick="downloadBackup()">データをファイル保存</button><div class="field"><label>バックアップから復元</label><input type="file" id="backupFile" accept="application/json" onchange="restoreBackup(event)"></div><button class="danger" onclick="clearAllData()">全データ削除</button></div></section>
<div class="print-area" id="printArea"></div><div class="footer"></div>
</main>
<script>
const $=id=>document.getElementById(id);const yen=n=>'¥'+Number(n||0).toLocaleString('ja-JP');const today=()=>new Date().toISOString().slice(0,10);const ym=()=>today().slice(0,7);const year=()=>new Date().getFullYear();
let reservations=load('kp_reservations',[]),sales=load('kp_sales',[]),products=load('kp_products',defaultProducts());function load(k,d){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch(e){return d}}function persist(){localStorage.setItem('kp_reservations',JSON.stringify(reservations));localStorage.setItem('kp_sales',JSON.stringify(sales));localStorage.setItem('kp_products',JSON.stringify(products))}
function defaultProducts(){return[{id:1,name:'贅沢ミルク食パン',price:700,category:'食パン',note:''},{id:2,name:'ベーグルサンド',price:370,category:'ベーグル',note:''},{id:3,name:'クロワッサン',price:300,category:'菓子パン',note:''},{id:4,name:'あんバター',price:330,category:'菓子パン',note:''},{id:5,name:'ミルク屋さんのメロンパン',price:250,category:'菓子パン',note:''},{id:6,name:'塩バターベーグル',price:250,category:'ベーグル',note:''},{id:7,name:'ごほうびチーズケーキ',price:450,category:'チーズケーキ',note:''}]}
['rDate','filterDate','makeDate','sDate','printDate'].forEach(id=>$(id).value=today());$('statsMonth').value=ym();$('statsYear').value=year();$('analysisYear').value=year();$('todayText').textContent=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
function showTab(id,btn){document.querySelectorAll('.tab').forEach(x=>x.classList.add('hidden'));$(id).classList.remove('hidden');document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));btn.classList.add('active');render()}
function addReserveItem(item={productId:'',name:'',price:0,qty:1}){const wrap=$('reserveItems');const div=document.createElement('div');div.className='item-row';div.innerHTML=`<div class="grid"><div class="field"><label>商品</label><select class="riProduct" onchange="applyProduct(this)"><option value="">商品を選択</option>${products.map(p=>`<option value="${p.id}" ${String(item.productId)===String(p.id)?'selected':''}>${esc(p.name)} / ${yen(p.price)}</option>`).join('')}</select></div><div class="field"><label>商品名</label><input class="riName" value="${esc(item.name)}"></div></div><div class="grid3"><div class="field"><label>単価</label><input class="riPrice" type="number" value="${item.price||0}" oninput="calcReserveTotal()"></div><div class="field"><label>個数</label><input class="riQty" type="number" min="1" value="${item.qty||1}" oninput="calcReserveTotal()"></div><div class="field"><label>小計</label><input class="riSub" type="number" readonly></div></div><button class="danger smallbtn" onclick="this.parentElement.remove();calcReserveTotal()">削除</button>`;wrap.appendChild(div);calcReserveTotal()}
function applyProduct(sel){const p=products.find(x=>String(x.id)===String(sel.value));if(!p)return;const row=sel.closest('.item-row');row.querySelector('.riName').value=p.name;row.querySelector('.riPrice').value=p.price;calcReserveTotal()}
function calcReserveTotal(){let total=0;document.querySelectorAll('.item-row').forEach(r=>{const sub=Number(r.querySelector('.riPrice').value||0)*Number(r.querySelector('.riQty').value||0);r.querySelector('.riSub').value=sub;total+=sub});$('rTotal').value=total}
function saveReservation(){const items=[...document.querySelectorAll('.item-row')].map(r=>({productId:r.querySelector('.riProduct').value,name:r.querySelector('.riName').value.trim(),price:Number(r.querySelector('.riPrice').value||0),qty:Number(r.querySelector('.riQty').value||0),amount:Number(r.querySelector('.riSub').value||0)})).filter(x=>x.name&&x.qty>0);if(!$('rDate').value||!$('rName').value.trim()||items.length===0){alert('日付・お客様名・商品を入力してください');return}const data={id:$('editId').value||String(Date.now()),date:$('rDate').value,time:$('rTime').value,name:$('rName').value.trim(),items,status:$('rStatus').value,note:$('rNote').value.trim(),amount:items.reduce((a,b)=>a+b.amount,0)};const i=reservations.findIndex(x=>String(x.id)===String(data.id));if(i>=0)reservations[i]=data;else reservations.push(data);persist();clearReserveForm();render();alert('予約を保存しました')}
function clearReserveForm(){$('editId').value='';$('reserveFormTitle').textContent='予約を追加';$('cancelEditBtn').classList.add('hidden');$('rTime').value='';$('rName').value='';$('rStatus').value='未受取';$('rNote').value='';$('reserveItems').innerHTML='';addReserveItem();calcReserveTotal()}
function editReservation(id){const r=reservations.find(x=>String(x.id)===String(id));if(!r)return;showTab('reserve',document.querySelector('.tabs button:nth-child(2)'));$('editId').value=r.id;$('reserveFormTitle').textContent='予約内容を変更';$('cancelEditBtn').classList.remove('hidden');$('rDate').value=r.date;$('rTime').value=r.time||'';$('rName').value=r.name;$('rStatus').value=r.status||'未受取';$('rNote').value=r.note||'';$('reserveItems').innerHTML='';(r.items||[]).forEach(addReserveItem);calcReserveTotal();scrollTo(0,0)}
function deleteReservation(id){if(confirm('削除しますか？')){reservations=reservations.filter(x=>String(x.id)!==String(id));persist();render()}}
function changeStatus(id,val){const r=reservations.find(x=>String(x.id)===String(id));if(r){r.status=val;persist();render()}}
function saveSale(){const d=$('sDate').value;let s=sales.find(x=>x.date===d);if(!s){s={date:d};sales.push(s)}s.store=Number($('sStore').value||0);s.weather=$('sWeather').value;s.customers=Number($('sCustomers').value||0);s.memo=$('sMemo').value.trim();persist();render();alert('売上を保存しました')}
function loadSaleForm(){const s=sales.find(x=>x.date===$('sDate').value)||{};$('sStore').value=s.store||'';$('sWeather').value=s.weather||'未入力';$('sCustomers').value=s.customers||'';$('sMemo').value=s.memo||'';renderSalesSummary()}
function saveProduct(){const data={id:$('pEditId').value||String(Date.now()),name:$('pName').value.trim(),price:Number($('pPrice').value||0),category:$('pCategory').value,note:$('pNote').value.trim()};if(!data.name){alert('商品名を入力してください');return}const i=products.findIndex(x=>String(x.id)===String(data.id));if(i>=0)products[i]=data;else products.push(data);persist();clearProductForm();render()}
function editProduct(id){const p=products.find(x=>String(x.id)===String(id));if(!p)return;$('pEditId').value=p.id;$('pName').value=p.name;$('pPrice').value=p.price;$('pCategory').value=p.category;$('pNote').value=p.note||'';$('pCancel').classList.remove('hidden')}
function clearProductForm(){$('pEditId').value='';$('pName').value='';$('pPrice').value='';$('pNote').value='';$('pCancel').classList.add('hidden')}
function deleteProduct(id){if(confirm('商品を削除しますか？')){products=products.filter(x=>String(x.id)!==String(id));persist();render()}}
function reserveAmount(date,includeCancel=false){return reservations.filter(r=>r.date===date&&(includeCancel||r.status!=='キャンセル')).reduce((a,r)=>a+Number(r.amount||0),0)}function totalSales(date){const s=sales.find(x=>x.date===date)||{};return reserveAmount(date)+Number(s.store||0)}
function flatReservations(list=reservations){let arr=[];list.forEach(r=>(r.items||[]).forEach(it=>arr.push({...it,date:r.date,time:r.time,name:r.name,status:r.status,note:r.note,reservationId:r.id})));return arr}
function render(){renderHome();renderReservations();renderProduction();renderProducts();renderStats();renderRepeaters();renderAnalysis();loadSaleForm()}
function renderHome(){const d=today(),trs=reservations.filter(r=>r.date===d),active=trs.filter(r=>r.status!=='キャンセル'),make=flatReservations(active).reduce((a,x)=>a+Number(x.qty||0),0);$('homeReserveCount').textContent=trs.length+'件';$('homeReserveAmount').textContent=yen(active.reduce((a,r)=>a+r.amount,0));$('homeStoreSales').textContent=yen((sales.find(s=>s.date===d)||{}).store||0);$('homeTotalSales').textContent=yen(totalSales(d));$('homeMakeCount').textContent=make+'個';$('homeUnreceived').textContent=trs.filter(r=>r.status==='未受取').length+'件';$('homeReceived').textContent=trs.filter(r=>r.status==='受取済み').length+'件';$('homeCanceled').textContent=trs.filter(r=>r.status==='キャンセル').length+'件';$('todayReservations').innerHTML=trs.length?trs.map(reservationHtml).join(''):'<div class="empty">今日の予約はありません</div>';renderLastYear(d)}
function renderLastYear(d){const ly=new Date(d);ly.setFullYear(ly.getFullYear()-1);const ld=ly.toISOString().slice(0,10);const rs=reservations.filter(r=>r.date===ld&&r.status!=='キャンセル');const s=sales.find(x=>x.date===ld)||{};const flat=flatReservations(rs);const top=rankItems(flat)[0];$('lastYearToday').innerHTML=rs.length||s.store?`<div class="notice"><b>${ld}（${['日','月','火','水','木','金','土'][ly.getDay()]}）</b><br>天気：${esc(s.weather||'未入力')}<br>予約件数：${rs.length}件<br>予約金額：${yen(reserveAmount(ld))}<br>店頭販売：${yen(s.store||0)}<br>合計売上：<b>${yen(totalSales(ld))}</b><br>一番売れたパン：${top?esc(top.name)+' '+top.qty+'個':'記録なし'}<br>来店人数：${s.customers||0}人<br>メモ：${esc(s.memo||'-')}</div>`:'<div class="empty">去年の同日の記録はまだありません</div>'}
function renderReservations(){const fd=$('filterDate').value,ft=($('filterText').value||'').toLowerCase();let list=reservations.filter(r=>(!fd||r.date===fd)&&(!ft||r.name.toLowerCase().includes(ft)||(r.items||[]).some(i=>i.name.toLowerCase().includes(ft))));list.sort((a,b)=>(a.date+(a.time||'')).localeCompare(b.date+(b.time||'')));$('reservationList').innerHTML=list.length?list.map(reservationHtml).join(''):'<div class="empty">予約がありません</div>'}
function reservationHtml(r){return `<div class="list-item"><b>${r.date} ${r.time||''}　${esc(r.name)}</b><span class="pill">${r.status}</span><br>${(r.items||[]).map(i=>`${esc(i.name)} × ${i.qty} <span class="price">${yen(i.amount)}</span>`).join('<br>')}<div class="mini">備考：${esc(r.note||'-')}</div><select onchange="changeStatus('${r.id}',this.value)"><option ${r.status==='未受取'?'selected':''}>未受取</option><option ${r.status==='受取済み'?'selected':''}>受取済み</option><option ${r.status==='キャンセル'?'selected':''}>キャンセル</option></select><button class="smallbtn blue" onclick="editReservation('${r.id}')">予約内容を変更</button><button class="smallbtn danger" onclick="deleteReservation('${r.id}')">削除</button></div>`}
function renderProduction(){const d=$('makeDate').value;const list=flatReservations(reservations.filter(r=>r.date===d&&r.status!=='キャンセル'));const ranked=rankItems(list);const byCat={};ranked.forEach(x=>{const p=products.find(p=>p.name===x.name);const c=(p&&p.category)||'その他';(byCat[c]||(byCat[c]=[])).push(x)});$('productionList').innerHTML=ranked.length?Object.entries(byCat).map(([c,items])=>`<h2>${esc(c)}</h2>`+items.map(x=>`<div class="list-item">☐ <b>${esc(x.name)}</b>　${x.qty}個</div>`).join('')).join(''):'<div class="empty">製造予定はありません</div>'}
function rankItems(list){const m={};list.forEach(x=>{if(!m[x.name])m[x.name]={name:x.name,qty:0,amount:0};m[x.name].qty+=Number(x.qty||0);m[x.name].amount+=Number(x.amount||0)});return Object.values(m).sort((a,b)=>b.qty-a.qty)}
function renderSalesSummary(){const d=$('sDate').value;$('salesSummary').innerHTML=`予約金額：${yen(reserveAmount(d))}<br>店頭販売：${yen(Number($('sStore').value||0))}<br>1日の合計：<b>${yen(reserveAmount(d)+Number($('sStore').value||0))}</b>`}
function renderProducts(){$('productList').innerHTML=products.map(p=>`<div class="list-item"><b>${esc(p.name)}</b><span class="pill">${esc(p.category)}</span><br><span class="price">${yen(p.price)}</span><div class="mini">${esc(p.note||'')}</div><button class="smallbtn blue" onclick="editProduct('${p.id}')">編集</button><button class="smallbtn danger" onclick="deleteProduct('${p.id}')">削除</button></div>`).join('')}
function renderStats(){const month=$('statsMonth').value,yr=String($('statsYear').value);const monthly=rankItems(flatReservations(reservations.filter(r=>r.date.startsWith(month)&&r.status!=='キャンセル')));const yearly=rankItems(flatReservations(reservations.filter(r=>r.date.startsWith(yr)&&r.status!=='キャンセル')));$('productStats').innerHTML='<h2>月間ランキング</h2>'+rankHtml(monthly)+'<h2>年間ランキング</h2>'+rankHtml(yearly)}
function rankHtml(arr){const max=Math.max(...arr.map(x=>x.qty),1);return arr.length?arr.map((x,i)=>`<div class="list-item"><b>${i+1}. ${esc(x.name)}</b><br>数量 ${x.qty}個 / 売上 ${yen(x.amount)}<div class="bar"><span style="width:${x.qty/max*100}%"></span></div></div>`).join(''):'<div class="empty">データがありません</div>'}
function renderRepeaters(){const map={};reservations.filter(r=>r.status!=='キャンセル').forEach(r=>{const k=r.name;if(!map[k])map[k]={name:k,count:0,total:0,first:r.date,last:r.date,items:[]};map[k].count++;map[k].total+=r.amount;map[k].first=r.date<map[k].first?r.date:map[k].first;map[k].last=r.date>map[k].last?r.date:map[k].last;map[k].items.push(...(r.items||[]))});const arr=Object.values(map).sort((a,b)=>b.count-a.count);$('repeaterList').innerHTML=arr.length?arr.map(c=>{const top=rankItems(c.items).slice(0,5).map(x=>`${esc(x.name)} ${x.qty}個`).join(' / ');return `<div class="list-item"><b>${esc(c.name)}</b><br>来店 ${c.count}回 / 合計 ${yen(c.total)} / 平均 ${yen(Math.round(c.total/c.count))}<div class="mini">初回：${c.first}　最終：${c.last}<br>よく買う商品：${top||'-'}</div></div>`}).join(''):'<div class="empty">リピーター履歴はありません</div>'}
function renderAnalysis(){const yr=String($('analysisYear').value);const days=['日','月','火','水','木','金','土'];const w=days.map(d=>({day:d,sum:0,count:0}));sales.concat(reservations.map(r=>({date:r.date}))).forEach(()=>{});[...new Set([...sales.map(s=>s.date),...reservations.map(r=>r.date)])].filter(d=>d.startsWith(yr)).forEach(d=>{const idx=new Date(d).getDay();w[idx].sum+=totalSales(d);w[idx].count++});$('weekdayAnalysis').innerHTML=w.map(x=>`<div class="list-item"><b>${x.day}曜日</b>　平均 ${yen(x.count?Math.round(x.sum/x.count):0)}　合計 ${yen(x.sum)}</div>`).join('');let months=[];for(let i=1;i<=12;i++){const m=yr+'-'+String(i).padStart(2,'0');const dates=[...new Set([...sales.map(s=>s.date),...reservations.map(r=>r.date)])].filter(d=>d.startsWith(m));months.push({m:i,sum:dates.reduce((a,d)=>a+totalSales(d),0)})}$('monthlyAnalysis').innerHTML=rankHtml(months.map(x=>({name:x.m+'月',qty:x.sum,amount:x.sum})));const years=[...new Set([...sales.map(s=>s.date.slice(0,4)),...reservations.map(r=>r.date.slice(0,4))])].sort();$('yearlyAnalysis').innerHTML=years.map(y=>{const dates=[...new Set([...sales.map(s=>s.date),...reservations.map(r=>r.date)])].filter(d=>d.startsWith(y));const sum=dates.reduce((a,d)=>a+totalSales(d),0);return `<div class="list-item"><b>${y}年</b>　${yen(sum)}</div>`}).join('')||'<div class="empty">データがありません</div>'}
function buildTodayText(d){const rs=reservations.filter(r=>r.date===d);return `【${d} 予約】\n`+(rs.length?rs.map(r=>`${r.time||''} ${r.name} ${r.status}\n`+(r.items||[]).map(i=>`・${i.name} ×${i.qty}`).join('\n')).join('\n\n'):'予約なし')+`\n\n予約金額 ${yen(reserveAmount(d))}\n店頭販売 ${yen((sales.find(s=>s.date===d)||{}).store||0)}\n合計 ${yen(totalSales(d))}`}
function buildProductionText(d){const arr=rankItems(flatReservations(reservations.filter(r=>r.date===d&&r.status!=='キャンセル')));return `【${d} 製造リスト】\n`+(arr.length?arr.map(x=>`□ ${x.name} ${x.qty}個`).join('\n'):'製造予定なし')}
function buildDailySalesText(d){const s=sales.find(x=>x.date===d)||{};return `【${d} 売上】\n予約金額 ${yen(reserveAmount(d))}\n店頭販売 ${yen(s.store||0)}\n合計 ${yen(totalSales(d))}\n天気 ${s.weather||'未入力'}\n来店人数 ${s.customers||0}人\nメモ ${s.memo||'-'}`}
function shareLine(text){location.href='https://line.me/R/msg/text/?'+encodeURIComponent(text)}function copyText(text){navigator.clipboard.writeText(text).then(()=>alert('コピーしました'))}
function printReport(type){let html='<h1>くぼちゃんパン 管理レポート</h1>';const d=$('printDate').value||today();if(type==='today')html+=`<h2>${d} 予約一覧</h2>${tableReservations(reservations.filter(r=>r.date===d))}`;if(type==='production')html+=`<h2>${d} 製造リスト</h2>`+buildProductionText($('makeDate').value||d).replaceAll('\n','<br>');if(type==='month'){const m=d.slice(0,7);html+=`<h2>${m} 月間売上</h2>`+tableSales([...new Set([...sales.map(s=>s.date),...reservations.map(r=>r.date)])].filter(x=>x.startsWith(m)).sort())}if(type==='year'){const y=d.slice(0,4);html+=`<h2>${y} 年間売上</h2>`+tableSales([...new Set([...sales.map(s=>s.date),...reservations.map(r=>r.date)])].filter(x=>x.startsWith(y)).sort())}if(type==='stats')html+=$('productStats').innerHTML;if(type==='repeaters')html+=$('repeaterList').innerHTML;if(type==='analysis')html+=$('weekdayAnalysis').innerHTML+$('monthlyAnalysis').innerHTML+$('yearlyAnalysis').innerHTML;$('printArea').innerHTML=html;setTimeout(()=>window.print(),100)}
function tableReservations(rs){return `<table class="table"><tr><th>時間</th><th>名前</th><th>商品</th><th>金額</th><th>状態</th></tr>`+rs.map(r=>`<tr><td>${r.time||''}</td><td>${esc(r.name)}</td><td>${(r.items||[]).map(i=>esc(i.name)+'×'+i.qty).join('<br>')}</td><td>${yen(r.amount)}</td><td>${r.status}</td></tr>`).join('')+'</table>'}
function tableSales(dates){let sum=0;const rows=dates.map(d=>{const v=totalSales(d);sum+=v;return `<tr><td>${d}</td><td>${yen(reserveAmount(d))}</td><td>${yen((sales.find(s=>s.date===d)||{}).store||0)}</td><td>${yen(v)}</td></tr>`}).join('');return `<table class="table"><tr><th>日付</th><th>予約</th><th>店頭</th><th>合計</th></tr>${rows}<tr><th colspan="3">合計</th><th>${yen(sum)}</th></tr></table>`}
function downloadBackup(){const data={version:'1.0',savedAt:new Date().toISOString(),reservations,sales,products};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='kubochan_pan_backup_'+today()+'.json';a.click()}
function restoreBackup(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);reservations=d.reservations||[];sales=d.sales||[];products=d.products||defaultProducts();persist();render();alert('復元しました')}catch(err){alert('復元できませんでした')}};r.readAsText(f)}
function clearAllData(){if(confirm('全データを削除しますか？必ず先にバックアップしてください。')){localStorage.clear();location.reload()}}
function esc(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
clearReserveForm();render();if('serviceWorker'in navigator)navigator.serviceWorker.register('service-worker.js').catch(()=>{});
</script>
</body></html>
