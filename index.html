<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#8b4f20" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <title>パン屋 予約・売上管理</title>
</head>
<body>
  <header>
    <h1>パン屋 予約・売上管理</h1>
    <div id="todayText"></div>
    <div id="syncStatus">共有データを読み込み中…</div>
  </header>

  <main>
    <section class="card">
      <h2>予約を追加</h2>
      <div class="grid">
        <label>日付<input id="date" type="date"></label>
        <label>受取時間<input id="time" type="time"></label>
      </div>
      <label>お客様名<input id="name" placeholder="例：山田様"></label>
      <label>商品名を直接入力<input id="item" placeholder="例：贅沢ミルク食パン"></label>
      <div class="grid">
        <label>単価<input id="unitPrice" type="number" inputmode="numeric" value="700"></label>
        <label>個数<input id="qty" type="number" inputmode="numeric" value="1" min="1"></label>
      </div>
      <label>金額<input id="amount" type="number" inputmode="numeric" value="700"></label>
      <label>状態
        <select id="status">
          <option>未受取</option>
          <option>受取済み</option>
          <option>キャンセル</option>
        </select>
      </label>
      <label>備考<textarea id="note" placeholder="例：6枚切り、袋分け、領収書あり"></textarea></label>
      <button id="saveBtn">予約を保存</button>
    </section>

    <section class="card">
      <h2>商品をすばやく選択</h2>
      <div class="quick" id="quickProducts"></div>
    </section>

    <section class="card">
      <h2>共有予約一覧</h2>
      <button class="sub" id="reloadBtn">再読み込み</button>
      <div id="list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
