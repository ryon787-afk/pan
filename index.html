<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>パン屋予約・売上管理</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#A0522D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="パン管理" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
</head>
<body>
  <header class="app-header">
    <h1>パン屋予約・売上管理</h1>
    <p>予約・商品・売上・天気・備考をまとめて管理</p>
  </header>

  <nav class="tabs">
    <button class="tab active" data-screen="home">ホーム</button>
    <button class="tab" data-screen="reservations">予約</button>
    <button class="tab" data-screen="sales">売上</button>
    <button class="tab" data-screen="products">商品</button>
    <button class="tab" data-screen="reports">実績</button>
  </nav>

  <main>
    <section id="home" class="screen active-screen">
      <h2>今日の状況</h2>
      <div class="cards">
        <div class="card"><span>今日の予約数</span><strong id="todayReservationCount">0</strong></div>
        <div class="card"><span>今日の売上</span><strong id="todaySalesTotal">0円</strong></div>
        <div class="card"><span>今月平均売上</span><strong id="monthAverageSales">0円</strong></div>
      </div>
      <h3>今日の予約</h3>
      <div id="todayReservations" class="list"></div>
    </section>

    <section id="reservations" class="screen">
      <h2>予約登録</h2>
      <form id="reservationForm" class="form-card">
        <label>日付<input type="date" id="reservationDate" required /></label>
        <label>お客さんの名前<input type="text" id="customerName" placeholder="例：山田さん" required /></label>
        <label>商品<select id="reservationProduct" required></select></label>
        <label>個数<input type="number" id="reservationQuantity" min="1" value="1" required /></label>
        <label>受取時間<input type="time" id="pickupTime" /></label>
        <label>状態
          <select id="reservationStatus">
            <option value="未受取">未受取</option>
            <option value="受取済み">受取済み</option>
            <option value="キャンセル">キャンセル</option>
          </select>
        </label>
        <label>備考<textarea id="reservationNote" placeholder="例：6枚切り、袋不要など"></textarea></label>
        <p class="auto-total">予約金額：<strong id="reservationTotalPreview">0円</strong></p>
        <button type="submit">予約を保存</button>
      </form>
      <h3>予約一覧</h3>
      <div id="reservationList" class="list"></div>
    </section>

    <section id="sales" class="screen">
      <h2>売上入力</h2>
      <form id="salesForm" class="form-card">
        <label>日付<input type="date" id="salesDate" required /></label>
        <label>その日の売上<input type="number" id="salesAmount" min="0" placeholder="例：58000" required /></label>
        <label>天気
          <select id="weather">
            <option value="晴れ">晴れ</option>
            <option value="くもり">くもり</option>
            <option value="雨">雨</option>
            <option value="雪">雪</option>
            <option value="台風・荒天">台風・荒天</option>
          </select>
        </label>
        <label>天気メモ<input type="text" id="weatherNote" placeholder="例：午前中だけ雨" /></label>
        <label>備考<textarea id="salesNote" placeholder="例：イベントあり、客足多め"></textarea></label>
        <button type="submit">売上を保存</button>
      </form>
      <h3>売上一覧</h3>
      <div id="salesList" class="list"></div>
    </section>

    <section id="products" class="screen">
      <h2>商品登録</h2>
      <form id="productForm" class="form-card">
        <label>商品名<input type="text" id="productName" placeholder="例：食パン" required /></label>
        <label>金額<input type="number" id="productPrice" min="0" placeholder="例：320" required /></label>
        <label>カテゴリ<input type="text" id="productCategory" placeholder="例：食パン・菓子パン" /></label>
        <button type="submit">商品を保存</button>
      </form>
      <h3>商品一覧</h3>
      <div id="productList" class="list"></div>
    </section>

    <section id="reports" class="screen">
      <h2>実績</h2>
      <div class="cards">
        <div class="card"><span>今月売上</span><strong id="reportMonthSales">0円</strong></div>
        <div class="card"><span>今年売上</span><strong id="reportYearSales">0円</strong></div>
        <div class="card"><span>月平均売上</span><strong id="reportAverageSales">0円</strong></div>
      </div>
      <h3>天気別売上</h3>
      <div id="weatherReport" class="list"></div>
      <h3>商品別予約実績</h3>
      <div id="productReport" class="list"></div>
    </section>
  </main>

  <footer>
    <button id="exportButton">バックアップ書き出し</button>
    <label class="import-label">復元<input type="file" id="importFile" accept="application/json" /></label>
  </footer>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js'));
    }
  </script>
</body>
</html>
