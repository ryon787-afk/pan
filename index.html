<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#58aee6"><link rel="manifest" href="manifest.json"><title>くぼちゃんパン管理システム</title><style>
:root{--bg:#dff5ff;--panel:#2f91d2;--panel2:#176eaa;--white:#fff;--text:#07344f;--muted:#d9f2ff;--line:rgba(255,255,255,.35);--danger:#e75f5f;--ok:#39a96b;--warn:#f2a93b}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--text);font-size:15px}button,input,select,textarea{font:inherit}header{position:sticky;top:0;z-index:5;background:linear-gradient(135deg,#58b7ec,#1976ba);color:white;padding:12px 12px 10px;border-bottom-left-radius:20px;border-bottom-right-radius:20px;box-shadow:0 5px 16px rgba(20,90,140,.2)}h1{font-size:18px;margin:0}.sub{font-size:12px;opacity:.9}.wrap{max-width:1100px;margin:0 auto;padding:10px 10px 86px}.tabs{position:fixed;left:0;right:0;bottom:0;z-index:10;background:#e9f9ff;border-top:1px solid #b8e7ff;display:grid;grid-template-columns:repeat(6,1fr);gap:4px;padding:6px max(6px,env(safe-area-inset-left)) calc(6px + env(safe-area-inset-bottom)) max(6px,env(safe-area-inset-right))}.tabs button{font-size:11px;padding:8px 2px;border-radius:12px;border:0;background:#ccefff;color:#07507a;font-weight:800}.tabs button.active{background:#1976ba;color:#fff}.card{background:var(--panel);color:white;border-radius:18px;padding:12px;margin:10px 0;box-shadow:0 4px 12px rgba(21,93,143,.12)}.card.light{background:#fff;color:var(--text);border:1px solid #bdeaff}.card h2{font-size:16px;margin:0 0 10px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{background:rgba(255,255,255,.18);border:1px solid var(--line);border-radius:14px;padding:9px;min-height:66px}.stat small{display:block;font-size:11px;color:#e7f8ff}.stat b{display:block;font-size:18px;margin-top:4px}.field{margin:8px 0}label{display:block;font-size:12px;margin:0 0 4px;color:inherit;opacity:.9}input,select,textarea{width:100%;padding:12px;border-radius:12px;border:1px solid #b7e8ff;background:#fff;color:#07344f;min-width:0}textarea{min-height:72px;resize:vertical}.btn{border:0;border-radius:13px;padding:11px 12px;font-weight:800;background:#fff;color:#12689f}.primary{background:#0f6fad;color:white}.danger{background:#ffe0e0;color:#9b2020}.ok{background:#daf5e5;color:#146036}.warn{background:#fff1ce;color:#7b4a00}.row{display:flex;gap:8px;align-items:center}.row>*{flex:1}.hidden{display:none!important}.mini{font-size:12px;opacity:.86;line-height:1.55}.item{border-top:1px solid rgba(255,255,255,.35);padding:10px 0}.light .item{border-color:#d6f2ff}.pill{display:inline-block;background:rgba(255,255,255,.22);border-radius:999px;padding:3px 8px;font-size:12px;margin:2px}.light .pill{background:#dff5ff}.product-card{background:rgba(255,255,255,.14);border:1px solid var(--line);border-radius:14px;padding:10px;margin:8px 0}.printArea{background:#fff;color:#111;padding:20px}.lock{position:fixed;inset:0;z-index:99;background:linear-gradient(160deg,#dff5ff,#91d7ff);display:flex;align-items:center;justify-content:center;padding:18px}.lockbox{width:min(420px,100%);background:#fff;border-radius:24px;padding:20px;box-shadow:0 10px 30px rgba(0,70,120,.2)}.lockbox h2{margin:0 0 8px;color:#07507a}.lockbox .btn{width:100%;margin-top:8px}.notice{background:#eaf8ff;border:1px solid #b8eaff;border-radius:12px;padding:10px;margin:8px 0;color:#07405f}@media(max-width:430px){.stats{grid-template-columns:repeat(2,1fr)}.stat{min-height:58px;padding:8px}.stat b{font-size:16px}.grid{grid-template-columns:1fr}.wrap{padding:8px 8px 86px}.card{padding:10px;border-radius:16px}.tabs button{font-size:10px}.row{flex-direction:column;align-items:stretch}}@media(min-width:800px){.home-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:12px}.tabs{position:sticky;top:62px;bottom:auto;max-width:1100px;margin:8px auto;border-radius:18px;border:1px solid #b8e7ff;grid-template-columns:repeat(6,1fr)}.wrap{padding-bottom:20px}}@media print{body{background:#fff;color:#000}.tabs,header,.noPrint,.lock{display:none!important}.wrap{padding:0}.card{box-shadow:none;background:#fff!important;color:#000!important;border:0;margin:0}.printOnly{display:block!important}}
</style></head><body>
<div id="lockScreen" class="lock hidden"><div class="lockbox"><h2>🔒 パスワード入力</h2><p class="mini">くぼちゃんパン管理システムを開くにはパスワードが必要です。</p><input id="loginPass" type="password" placeholder="パスワード"><button class="btn primary" onclick="unlockApp()">開く</button><p id="loginMsg" class="mini" style="color:#b02020"></p></div></div>
<header><h1>くぼちゃんパン管理システム</h1><div class="sub" id="todayText"></div></header>
<nav class="tabs noPrint"><button class="active" onclick="tab('home',this)">🏠<br>ホーム</button><button onclick="tab('reserve',this)">📅<br>予約</button><button onclick="tab('make',this)">🍞<br>製造</button><button onclick="tab('sales',this)">💰<br>売上</button><button onclick="tab('analysis',this)">📊<br>分析</button><button onclick="tab('settings',this)">⚙️<br>設定</button></nav>
<main class="wrap">
<section id="home" class="tab"><div class="home-grid"><div class="card"><h2>今日のまとめ</h2><div class="stats"><div class="stat"><small>予約件数</small><b id="hRes">0件</b></div><div class="stat"><small>予約金額</small><b id="hResAmt">¥0</b></div><div class="stat"><small>店頭売上</small><b id="hStore">¥0</b></div><div class="stat"><small>合計売上</small><b id="hTotal">¥0</b></div><div class="stat"><small>製造種類</small><b id="hMake">0種</b></div><div class="stat"><small>未受取</small><b id="hWait">0件</b></div><div class="stat"><small>受取済</small><b id="hDone">0件</b></div><div class="stat"><small>キャンセル</small><b id="hCancel">0件</b></div></div></div><div class="card"><h2>去年の今日</h2><div id="lastYearBox" class="mini"></div></div></div><div class="card"><h2>今日の製造リスト</h2><div id="homeMake"></div></div></section>
<section id="reserve" class="tab hidden"><div class="card"><h2>予約登録</h2><div class="grid"><div class="field"><label>日付</label><input id="rDate" type="date"></div><div class="field"><label>受取時間</label><input id="rTime" type="time"></div><div class="field"><label>お客様名</label><input id="rName" placeholder="山田様"></div><div class="field"><label>状態</label><select id="rStatus"><option>未受取</option><option>受取済み</option><option>キャンセル</option></select></div></div><div id="rItems"></div><button class="btn" onclick="addReserveItem()">＋ 商品を追加</button><div class="field"><label>備考</label><textarea id="rNote"></textarea></div><button class="btn primary" onclick="saveReservation()">予約を保存</button><button id="cancelEdit" class="btn warn hidden" onclick="clearReserveForm()">編集をやめる</button></div><div class="card"><h2>予約一覧</h2><div class="grid"><input id="filterDate" type="date" oninput="render()"><input id="searchName" placeholder="名前・商品検索" oninput="render()"></div><div id="reservationList"></div></div></section>
<section id="make" class="tab hidden"><div class="card"><h2>製造リスト</h2><div class="grid"><input id="makeDate" type="date" oninput="render()"><button class="btn" onclick="printBlock('makePrint')">印刷</button><button class="btn" onclick="shareLine(makeText(makeDate.value))">LINE送信</button></div><div id="makeList"></div></div></section>
<section id="sales" class="tab hidden"><div class="card"><h2>店頭販売売上</h2><div class="grid"><div class="field"><label>日付</label><input id="sDate" type="date"></div><div class="field"><label>店頭販売売上</label><input id="sStore" type="number" min="0" placeholder="50000"></div><div class="field"><label>天気</label><select id="sWeather"><option>未入力</option><option>晴れ</option><option>くもり</option><option>雨</option><option>雪</option><option>強風</option><option>猛暑</option><option>寒い</option></select></div><div class="field"><label>来店人数</label><input id="sCustomers" type="number" min="0"></div></div><div class="field"><label>メモ</label><textarea id="sMemo"></textarea></div><button class="btn primary" onclick="saveSale()">売上を保存</button></div><div class="card"><h2>売上一覧</h2><div id="salesList"></div></div></section>
<section id="analysis" class="tab hidden"><div class="card"><h2>分析</h2><div class="grid"><input id="aMonth" type="month" oninput="render()"><input id="aYear" type="number" oninput="render()"><button class="btn" onclick="printBlock('analysisPrint')">分析を印刷</button></div><div id="analysisBox"></div></div></section>
<section id="settings" class="tab hidden"><div class="card"><h2>商品管理</h2><div class="grid"><input id="pName" placeholder="商品名"><input id="pPrice" type="number" placeholder="価格"><select id="pCat"><option>食パン</option><option>ベーグル</option><option>菓子パン</option><option>惣菜パン</option><option>チーズケーキ</option><option>その他</option></select><button class="btn primary" onclick="addProduct()">商品追加</button></div><div id="productList"></div></div><div class="card"><h2>パスワード設定</h2><div class="notice">個人情報保護のため、アプリ起動時にパスワード入力を求めます。パスワードはこの端末内だけに保存されます。</div><div class="grid"><input id="newPass" type="password" placeholder="新しいパスワード"><input id="newPass2" type="password" placeholder="確認用"></div><button class="btn primary" onclick="setPassword()">パスワードを設定・変更</button><button class="btn warn" onclick="removePassword()">パスワードを解除</button><p class="mini">※ 端末内保存のため、別端末では別途設定が必要です。</p></div><div class="card"><h2>データ引き継ぎ</h2><button class="btn" onclick="downloadBackup()">データをファイル保存</button><input type="file" id="restoreFile" accept="application/json" onchange="restoreBackup(event)"><button class="btn danger" onclick="clearAllData()">全データ削除</button></div></section>
</main><script>
const K='kubochanPanV31';const PKEY='kubochanPanPassV1';let editingId=null;let data=load();function load(){return JSON.parse(localStorage.getItem(K)||'null')||{reservations:[],sales:[],products:[{id:1,name:'贅沢ミルク食パン',price:700,cat:'食パン'},{id:2,name:'ベーグルサンド',price:370,cat:'ベーグル'},{id:3,name:'クロワッサン',price:300,cat:'菓子パン'},{id:4,name:'ミルク屋さんのメロンパン',price:250,cat:'菓子パン'},{id:5,name:'ごほうびチーズケーキ',price:450,cat:'チーズケーキ'}]}}function save(){localStorage.setItem(K,JSON.stringify(data))}const today=()=>new Date().toISOString().slice(0,10);const yen=n=>'¥'+Number(n||0).toLocaleString('ja-JP');const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));document.getElementById('todayText').textContent=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});['rDate','filterDate','makeDate','sDate'].forEach(id=>document.getElementById(id).value=today());aMonth.value=today().slice(0,7);aYear.value=new Date().getFullYear();
function initLock(){if(localStorage.getItem(PKEY)){lockScreen.classList.remove('hidden')}else{lockScreen.classList.add('hidden')}}function hash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h+= (h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24)}return String(h>>>0)}function unlockApp(){const v=loginPass.value; if(hash(v)===localStorage.getItem(PKEY)){lockScreen.classList.add('hidden');loginPass.value=''}else{loginMsg.textContent='パスワードが違います'}}function setPassword(){if(!newPass.value||newPass.value!==newPass2.value){alert('パスワードが未入力、または確認用と一致しません');return}localStorage.setItem(PKEY,hash(newPass.value));newPass.value='';newPass2.value='';alert('パスワードを設定しました')}function removePassword(){if(confirm('パスワードを解除しますか？')){localStorage.removeItem(PKEY);alert('解除しました')}}
function tab(id,btn){document.querySelectorAll('main .tab').forEach(x=>x.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));btn.classList.add('active');render()}
function productOptions(sel=''){return '<option value="">商品を選択</option>'+data.products.map(p=>`<option value="${p.id}" ${String(sel)===String(p.id)?'selected':''}>${esc(p.name)} / ${yen(p.price)}</option>`).join('')}function addReserveItem(item={}){const div=document.createElement('div');div.className='product-card';div.innerHTML=`<div class="grid"><div class="field"><label>商品</label><select onchange="applyProd(this)">${productOptions(item.productId||'')}</select></div><div class="field"><label>商品名</label><input class="itName" value="${esc(item.name||'')}"></div><div class="field"><label>個数</label><input class="itQty" type="number" min="1" value="${item.qty||1}" oninput="calcItem(this)"></div><div class="field"><label>単価</label><input class="itPrice" type="number" min="0" value="${item.price||0}" oninput="calcItem(this)"></div><div class="field"><label>金額</label><input class="itAmount" type="number" min="0" value="${item.amount||0}"></div></div><button class="btn danger" onclick="this.parentElement.remove()">この商品を削除</button>`;rItems.appendChild(div)}function applyProd(sel){const p=data.products.find(x=>String(x.id)===sel.value);if(!p)return;const c=sel.closest('.product-card');c.querySelector('.itName').value=p.name;c.querySelector('.itPrice').value=p.price;calcItem(c.querySelector('.itQty'))}function calcItem(el){const c=el.closest('.product-card');c.querySelector('.itAmount').value=Number(c.querySelector('.itQty').value||0)*Number(c.querySelector('.itPrice').value||0)}function getFormItems(){return [...rItems.querySelectorAll('.product-card')].map(c=>({productId:c.querySelector('select').value,name:c.querySelector('.itName').value.trim(),qty:Number(c.querySelector('.itQty').value||1),price:Number(c.querySelector('.itPrice').value||0),amount:Number(c.querySelector('.itAmount').value||0)})).filter(x=>x.name)}function saveReservation(){const items=getFormItems();if(!rDate.value||!rName.value.trim()||!items.length){alert('日付・お客様名・商品を入力してください');return}const obj={id:editingId||Date.now(),date:rDate.value,time:rTime.value,name:rName.value.trim(),status:rStatus.value,note:rNote.value.trim(),items};if(editingId){data.reservations=data.reservations.map(r=>r.id===editingId?obj:r)}else{data.reservations.push(obj)}save();clearReserveForm();render();alert('保存しました')}function clearReserveForm(){editingId=null;rName.value='';rTime.value='';rNote.value='';rStatus.value='未受取';rItems.innerHTML='';addReserveItem();cancelEdit.classList.add('hidden')}function editRes(id){const r=data.reservations.find(x=>x.id===id);if(!r)return;editingId=id;rDate.value=r.date;rTime.value=r.time;rName.value=r.name;rStatus.value=r.status;rNote.value=r.note||'';rItems.innerHTML='';r.items.forEach(addReserveItem);cancelEdit.classList.remove('hidden');document.querySelector('[onclick*="reserve"]').click();scrollTo({top:0,behavior:'smooth'})}function delRes(id){if(confirm('削除しますか？')){data.reservations=data.reservations.filter(r=>r.id!==id);save();render()}}function changeStatus(id,v){const r=data.reservations.find(x=>x.id===id);if(r){r.status=v;save();render()}}
function resAmount(r){return (r.items||[]).reduce((a,i)=>a+Number(i.amount||0),0)}function renderReservations(){const fd=filterDate.value, q=searchName.value.trim();let list=data.reservations.filter(r=>(!fd||r.date===fd)&&(!q||(r.name+r.items.map(i=>i.name).join(' ')).includes(q))).sort((a,b)=>(a.time||'').localeCompare(b.time||''));reservationList.innerHTML=list.length?list.map(r=>`<div class="item"><b>${esc(r.time||'--:--')} ${esc(r.name)}</b> <span class="pill">${yen(resAmount(r))}</span><div>${r.items.map(i=>`<span class="pill">${esc(i.name)}×${i.qty}</span>`).join('')}</div><select onchange="changeStatus(${r.id},this.value)"><option ${r.status==='未受取'?'selected':''}>未受取</option><option ${r.status==='受取済み'?'selected':''}>受取済み</option><option ${r.status==='キャンセル'?'selected':''}>キャンセル</option></select><div class="row"><button class="btn" onclick="editRes(${r.id})">予約内容を変更</button><button class="btn danger" onclick="delRes(${r.id})">削除</button></div><div class="mini">${esc(r.note||'')}</div></div>`).join(''):'<div class="mini">予約がありません</div>'}
function makeSummary(date){const map={};data.reservations.filter(r=>r.date===date&&r.status!=='キャンセル').forEach(r=>(r.items||[]).forEach(i=>{if(!map[i.name])map[i.name]={qty:0,cat:(data.products.find(p=>p.name===i.name)||{}).cat||'その他',details:[]};map[i.name].qty+=Number(i.qty||0);map[i.name].details.push(`${r.time||'--:--'} ${r.name} ${i.qty}個`)}));return map}function renderMake(){const map=makeSummary(makeDate.value);const names=Object.keys(map).sort((a,b)=>map[a].cat.localeCompare(map[b].cat)||a.localeCompare(b));makeList.innerHTML=names.length?names.map(n=>`<div class="item"><b>${esc(n)}：${map[n].qty}個</b><span class="pill">${esc(map[n].cat)}</span><div class="mini">${map[n].details.map(esc).join('<br>')}</div></div>`).join(''):'<div class="mini">製造対象はありません</div>';homeMake.innerHTML=names.length?names.slice(0,8).map(n=>`<div class="item"><b>${esc(n)}：${map[n].qty}個</b><div class="mini">${map[n].details.map(esc).join(' / ')}</div></div>`).join(''):'<div class="mini">今日作るパンはありません</div>'}function makeText(date){const map=makeSummary(date);let s=`${date} 製造リスト\n`;Object.keys(map).forEach(n=>{s+=`\n${n}：${map[n].qty}個\n- ${map[n].details.join('\n- ')}`});return s}function shareLine(text){location.href='https://line.me/R/msg/text/?'+encodeURIComponent(text)}
function saveSale(){const s={date:sDate.value,store:Number(sStore.value||0),weather:sWeather.value,customers:Number(sCustomers.value||0),memo:sMemo.value};data.sales=data.sales.filter(x=>x.date!==s.date);data.sales.push(s);save();render();alert('保存しました')}function saleFor(date){return data.sales.find(s=>s.date===date)||{store:0,weather:'未入力',customers:0,memo:''}}function renderSales(){salesList.innerHTML=[...data.sales].sort((a,b)=>b.date.localeCompare(a.date)).map(s=>`<div class="item"><b>${s.date}</b> 店頭 ${yen(s.store)} <span class="pill">${esc(s.weather)}</span><div class="mini">来店${s.customers||0}人 ${esc(s.memo||'')}</div></div>`).join('')||'<div class="mini">売上データがありません</div>'}
function dayReservationAmount(date){return data.reservations.filter(r=>r.date===date&&r.status!=='キャンセル').reduce((a,r)=>a+resAmount(r),0)}function dayTotal(date){return dayReservationAmount(date)+Number(saleFor(date).store||0)}function renderHome(){const t=today(),rs=data.reservations.filter(r=>r.date===t),valid=rs.filter(r=>r.status!=='キャンセル');hRes.textContent=rs.length+'件';hResAmt.textContent=yen(dayReservationAmount(t));hStore.textContent=yen(saleFor(t).store);hTotal.textContent=yen(dayTotal(t));hWait.textContent=rs.filter(r=>r.status==='未受取').length+'件';hDone.textContent=rs.filter(r=>r.status==='受取済み').length+'件';hCancel.textContent=rs.filter(r=>r.status==='キャンセル').length+'件';hMake.textContent=Object.keys(makeSummary(t)).length+'種';const ly=new Date();ly.setFullYear(ly.getFullYear()-1);const d=ly.toISOString().slice(0,10);const top=topProducts(d)[0];lastYearBox.innerHTML=`<b>${d}</b><br>売上：${yen(dayTotal(d))}<br>予約：${data.reservations.filter(r=>r.date===d).length}件<br>天気：${esc(saleFor(d).weather||'未入力')}<br>一番売れたパン：${top?esc(top[0])+' '+top[1].qty+'個':'記録なし'}`}function topProducts(prefix){const m={};data.reservations.filter(r=>r.date.startsWith(prefix)&&r.status!=='キャンセル').forEach(r=>r.items.forEach(i=>{m[i.name]=m[i.name]||{qty:0,amount:0};m[i.name].qty+=Number(i.qty||0);m[i.name].amount+=Number(i.amount||0)}));return Object.entries(m).sort((a,b)=>b[1].qty-a[1].qty)}function renderAnalysis(){const ym=aMonth.value,yr=String(aYear.value);const monthDays=[...new Set([...data.reservations.map(r=>r.date),...data.sales.map(s=>s.date)].filter(d=>d.startsWith(ym)))];const monthTotal=monthDays.reduce((a,d)=>a+dayTotal(d),0);const yearDays=[...new Set([...data.reservations.map(r=>r.date),...data.sales.map(s=>s.date)].filter(d=>d.startsWith(yr)))];const yearTotal=yearDays.reduce((a,d)=>a+dayTotal(d),0);let w=[0,0,0,0,0,0,0],wc=[0,0,0,0,0,0,0];yearDays.forEach(d=>{const n=new Date(d).getDay();w[n]+=dayTotal(d);wc[n]++});const wd=['日','月','火','水','木','金','土'];analysisBox.innerHTML=`<div class="stats"><div class="stat"><small>月間売上</small><b>${yen(monthTotal)}</b></div><div class="stat"><small>年間売上</small><b>${yen(yearTotal)}</b></div><div class="stat"><small>月平均</small><b>${yen(monthDays.length?Math.round(monthTotal/monthDays.length):0)}</b></div><div class="stat"><small>営業日数</small><b>${monthDays.length}日</b></div></div><h2>曜日別平均</h2>${wd.map((x,i)=>`<div class="item"><b>${x}曜日</b> 平均 ${yen(wc[i]?Math.round(w[i]/wc[i]):0)} 合計 ${yen(w[i])}</div>`).join('')}<h2>商品ランキング</h2>${topProducts(ym).slice(0,10).map((e,i)=>`<div class="item">${i+1}. <b>${esc(e[0])}</b> ${e[1].qty}個 / ${yen(e[1].amount)}</div>`).join('')||'<div class="mini">データなし</div>'}`}
function addProduct(){if(!pName.value)return;data.products.push({id:Date.now(),name:pName.value,price:Number(pPrice.value||0),cat:pCat.value});pName.value='';pPrice.value='';save();render()}function delProduct(id){data.products=data.products.filter(p=>p.id!==id);save();render()}function renderProducts(){productList.innerHTML=data.products.map(p=>`<div class="item"><b>${esc(p.name)}</b> ${yen(p.price)} <span class="pill">${esc(p.cat)}</span><button class="btn danger" onclick="delProduct(${p.id})">削除</button></div>`).join('')}
function downloadBackup(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='kubochan-pan-backup-'+today()+'.json';a.click()}function restoreBackup(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{data=JSON.parse(r.result);save();render();alert('復元しました')};r.readAsText(f)}function clearAllData(){if(confirm('全データを削除しますか？')){localStorage.removeItem(K);location.reload()}}function printBlock(){window.print()}
function render(){renderHome();renderReservations();renderMake();renderSales();renderAnalysis();renderProducts()}clearReserveForm();initLock();render();if('serviceWorker'in navigator){navigator.serviceWorker.register('service-worker.js').catch(()=>{})}
